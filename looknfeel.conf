# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 8
    active_opacity = 2
    inactive_opacity = 2
    fullscreen_opacity = 2
    
    shadow {
        enabled = 0
    }
    blur {
        enabled = 0
        xray = 1
    }

    # Dim unfocused windows (0.0 = no dim, 1.0 = fully dimmed)
    # dim_inactive = true
    # dim_strength = 0.15
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}
# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
     gaps_in = 2
     gaps_out = 2
     border_size = 0
     #col.active_border = rgba(0a0a96cc)
     col.active_border = rgb(EF9149)
     # Use master layout instead of dwindle
     layout = master
     allow_tearing = true 
}

master {
    new_status = slave
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 0.8, 2, myBezier
    animation = windowsOut, 0.8, 2, default, popin 40%
    animation = border, 0.8, 10, default
    animation = borderangle, 0.8, 8, default
    #animation = fade, 1, 3, default
    animation = workspaces, 0.8, 3, default
}

#windowrules
#windowrule = match:class gamescope, immediate yes
#windowrule = match:class Minecraft* 1.21.1, immediate yes
#windowrule = match:class steam_app_264710, immediate yes
#windowrule = match:class cs2, immediate yes
#windowrule = immediate, class:^(steam_app_264710)$
#decoration:blur:enabled = false
#decoration:shadow:enabled = false
windowrule = no_screen_share on, match:class ^(Proton Pass)$
windowrule = tag +floating-window, match:class ^(Proton Pass)$


#---------------------GAMES-----------------#

windowrule {
  name = cs2-tearing
  match:class = ^(cs2)$
  workspace = 4 silent
  fullscreen = on
  immediate = on
}

windowrule {
  name = windowrule-2
  workspace = 3 silent
  match:class = steam
}

windowrule {
  name = windowrule-3
  match:class = steam_app_2073850
  workspace = 4 silent
  fullscreen_state = 3
  match:fullscreen = steam_app_2073850
  immediate = yes
}

windowrule {
  name = windowrule-4
  match:class = Minecraft.*
  workspace = 4 silent
  fullscreen_state = 3
}

windowrule {
  name = windowrule-5
  match:class = steam_app_1874880
  workspace = 4 silent
  fullscreen_state = 3
  immediate = yes
}

windowrule {
  name = mo2
  match:class = steam_app_0
  workspace = 4 silent
  float = on
}

windowrule {
  name = skyrim
  workspace = 4 silent
  match:class = steam_proton
  fullscreen = on
}

#-------------------------------------------------

windowrule {
  name = css2
  immediate = on
  match:class = ^(cs2)$
}

windowrule {
  name = steamapps
  match:class = ^(steam_app_.*)$
  workspace = 4 silent
  fullscreen = on
  immediate = on
}


#-----STEAM-------
#windowrule = float on, match:class steam
windowrule = center on, match:class steam, match:title Steam
windowrule = tag -default-opacity, match:class steam.*
windowrule = opacity 1 1, match:class steam.*
windowrule = size 1100 700, match:class steam, match:title Steam
windowrule = size 460 800, match:class steam, match:title Friends List
windowrule = idle_inhibit fullscreen, match:class steam
windowrule = float off, match:class steam
